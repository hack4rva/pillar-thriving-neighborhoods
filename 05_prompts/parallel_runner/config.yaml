# Parallel.ai runner configuration

# Processor tier — controls research depth and cost.
# Budget guide (approx for 51 prompts per pillar):
#   pro       ~$0.05-0.10/query  →  moderate depth, good for most prompts
#   pro-fast  ~2-5x faster, same cost tier
#   ultra     higher depth and cost — use for the most complex prompts
# See: https://docs.parallel.ai/task-api/guides/choose-a-processor
processor: pro

# Output format: text produces a markdown research report with inline citations.
# Leave as text — our prompts are designed for narrative research output.
output_schema: text

io:
  prompts_dir: 05_prompts/research
  output_dir: research
  overwrite: false
